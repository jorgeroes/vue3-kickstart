version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - echo "node-linker=hoisted" >> .npmrc
            - corepack enable
            - corepack prepare pnpm@9.15.0 --activate
            - pnpm install
        build:
          commands:
            - pnpm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
